
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KARSU PEN</title>

<link rel="stylesheet" href="style.css">

</head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<body>

<div class="container">

<h1>KARSU PEN</h1>
<h3>Pileli Sineklik Hesaplama</h3>

<label>Müşteri Adı</label>
<input id="musteri" type="text">

<label>Telefon</label>
<input id="telefon" type="tel">

<label>Adres</label>
<input id="adres" type="text">

<label>Renk</label>
<select id="renk">
<option>Beyaz</option>
<option>Antrasit</option>
<option>Meşe</option>
<option>Siyah</option>
</select>

<label>Adet</label>
<input id="adet" type="number" value="1">

<label>Net En (mm)</label>
<input id="en" type="number">

<label>Net Boy (mm)</label>
<input id="boy" type="number">

<button onclick="hesapla()">
HESAPLA
</button>

<div id="sonuc">

<table>

<tr>
<th>Parça</th>
<th>Sonuç</th>
</tr>

<tr>
<td>Yatay</td>
<td id="yatay"></td>
</tr>

<tr>
<td>Dikey</td>
<td id="dikey"></td>
</tr>

<tr>
<td>Kanat</td>
<td id="kanat"></td>
</tr>

<tr>
<td>Tül</td>
<td id="tul"></td>
</tr>

<tr>
<td>Tepe</td>
<td id="tepe"></td>
</tr>
<tr>
<td>İp</td>
<td id="ip"></td>
</tr>

<tr>
<td>İp x2</td>
<td id="ip2"></td>
</tr>

<tr>
<td>Takoz</td>
<td id="takoz"></td>
</tr>

</table>

<br>

<button class="altButon" onclick="pdfOlustur()">
PDF OLUŞTUR
</button>

<button class="paylas" onclick="paylas()">
PAYLAŞ
</button>

<button onclick="siparisKaydet()">
SİPARİŞİ KAYDET
</button>

</div>

<h2 style="margin-top:30px;">Kayıtlı Siparişler</h2>

<div id="liste">
</div>

</div>

<script src="app.js"></script>

<script> 

function pdfOlustur(){
alert("PDF özelliği bir sonraki sürümde aktif olacak.");
}

function paylas(){
alert("Paylaş özelliği bir sonraki sürümde aktif olacak.");
}

function siparisKaydet(){
alert("Sipariş kaydetme özelliği bir sonraki sürümde aktif olacak.");
}
</script>

</body>
</html>
